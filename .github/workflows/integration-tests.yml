name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run LUCID Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.41.0

      - name: Type check (arquivos locais)
        working-directory: supabase/functions/lucid-engine
        run: |
          deno check --no-remote \
            types.ts hash.ts radar.ts hago.ts rag.ts cda.ts \
            core.ts post-core.ts persistence.ts resolvers.ts

      - name: Run integration tests
        working-directory: supabase/functions/lucid-engine
        run: |
          deno test \
            --allow-env \
            --no-check \
            integration_test.ts
